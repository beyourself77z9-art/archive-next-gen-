<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المعلومات</title>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
background-image:url("infobgpng.jpeg");
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
width:90%;
max-width:600px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
margin-top:25px;
padding:15px;
font-size:18px;
background:#0d5c3b;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div class="container">

<h1>أدخل معلوماتك</h1>

<p>الاسم</p>
<input id="name">

<p>العمر</p>
<input id="age" type="number">

<p>المدينة</p>
<input id="city">

<button onclick="saveData()">التالي</button>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDIbGh7_Hjvp38QJxDC4zaVxKkXpVs-10",
authDomain: "archive-next-gen.firebaseapp.com",
projectId: "archive-next-gen",
storageBucket: "archive-next-gen.firebasestorage.app",
messagingSenderId: "973345848752",
appId: "1:973345848752:web:02a6bc4cef2c14e415ea75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function saveData(){

let name=document.getElementById("name").value.trim();
let age=document.getElementById("age").value.trim();
let city=document.getElementById("city").value.trim();

if(!name || !age || !city){
alert("الرجاء تعبئة جميع المعلومات");
return;
}

let userID = localStorage.getItem("userID");

db.collection("archive_participants")
.doc(userID)
.set({
name:name,
age:age,
city:city,
answers:[],
time:new Date().toISOString()
}).then(()=>{

window.location.href="questions.html";

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المعلومات</title>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
padding:0;
background-image:url("infobgpng.jpeg");
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
width:90%;
max-width:600px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
color:#0d5c3b;
margin-bottom:30px;
}

.input-box{
margin:20px 0;
text-align:right;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:25px;
padding:15px 50px;
font-size:18px;
background:#0d5c3b;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#0a4a30;
}

</style>
</head>

<body>

<div class="container">

<h1>أدخل معلوماتك</h1>

<div class="input-box">
<p>الاسم</p>
<input id="name" type="text">
</div>

<div class="input-box">
<p>العمر</p>
<input id="age" type="number">
</div>

<div class="input-box">
<p>المدينة</p>
<input id="city" type="text">
</div>

<button onclick="nextPage()">التالي</button>

</div>

<script>

function nextPage(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let city=document.getElementById("city").value;

if(name==="" || age==="" || city===""){
alert("الرجاء تعبئة جميع المعلومات");
return;
}

localStorage.setItem("name",name);
localStorage.setItem("age",age);
localStorage.setItem("city",city);

window.location.href="questions.html";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الأسئلة</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding-top:80px;
}

.container{
background:white;
padding:40px;
max-width:700px;
margin:auto;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
color:#0d5c3b;
}

.question{
margin-top:25px;
text-align:right;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:30px;
padding:15px 50px;
font-size:20px;
background:#0d5c3b;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>أسئلة الجيل القادم</h1>

<div class="question">
<p>ما القضية التي تؤمن أنها ستغير مستقبل الجيل القادم؟</p>
<input id="q1">
</div>

<div class="question">
<p>ما المهارة التي ستبني بها مستقبلك؟</p>
<input id="q2">
</div>

<div class="question">
<p>ما الخوف الذي يجب أن يهزمه جيلنا؟</p>
<input id="q3">
</div>

<div class="question">
<p>كيف ترى مستقبل الجيل القادم؟</p>
<input id="q4">
</div>

<div class="question">
<p>ما الرسالة التي تريد حفظها للتاريخ؟</p>
<input id="q5">
</div>

<button onclick="nextPage()">التالي</button>

</div>

<script>

function nextPage(){

let q1=document.getElementById("q1").value;
let q2=document.getElementById("q2").value;
let q3=document.getElementById("q3").value;
let q4=document.getElementById("q4").value;
let q5=document.getElementById("q5").value;

if(q1==="" || q2==="" || q3==="" || q4==="" || q5===""){
alert("الرجاء الإجابة على جميع الأسئلة");
return;
}

localStorage.setItem("q1",q1);
localStorage.setItem("q2",q2);
localStorage.setItem("q3",q3);
localStorage.setItem("q4",q4);
localStorage.setItem("q5",q5);

window.location.href="game.html";

}

</script>

</body>
</html>

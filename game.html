<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCsFx_VBi6SSUfhXM2ozXkXpVs-10",
authDomain:"archive-next-gen.firebaseapp.com",
projectId:"archive-next-gen",
storageBucket:"archive-next-gen.firebasestorage.firebasestorage.app",
messagingSenderId:"973345848752",
appId:"1:973345848752:web:02a6bc4cef2c14e415ea75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let userID = localStorage.getItem("userID");

let scoreInnovation=0;
let scoreHeritage=0;
let scoreTech=0;

let questions=[
{
q:"كيف تحب أن تكون الثقافة في المستقبل؟",
options:["رقمية","تراثية","متوازنة"]
},
{
q:"ما دور الشباب في الثقافة؟",
options:["الابتكار","الحفاظ على التراث","نشر المعرفة"]
},
{
q:"اختر كلمة تصف جيلك",
options:["طموح","مبدع","متجدد"]
}
];

let index=0;

function saveAnswer(answer){

if(answer==="الابتكار" || answer==="طموح" || answer==="مبدع"){
scoreInnovation++;
}

if(answer==="تراثية" || answer==="الحفاظ على التراث"){
scoreHeritage++;
}

if(answer==="رقمية"){
scoreTech++;
}

db.collection("archive_participants")
.doc(userID)
.update({
answers:firebase.firestore.FieldValue.arrayUnion({
question:questions[index].q,
answer:answer
}),
scores:{
innovation:scoreInnovation,
heritage:scoreHeritage,
tech:scoreTech
}
});

}

function showQuestion(){

if(index>=questions.length){
window.location.href="thanks.html";
return;
}

document.getElementById("question").innerText=questions[index].q;

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

questions[index].options.forEach(opt=>{
let btn=document.createElement("button");
btn.innerText=opt;

btn.onclick=function(){
saveAnswer(opt);
index++;
showQuestion();
};

optionsDiv.appendChild(btn);
});

}

window.onload=showQuestion;

</script>

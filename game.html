<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة الأرشيف</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0d5c3b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.box{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:25px;
width:420px;
text-align:center;
backdrop-filter:blur(10px);
}

input{
width:90%;
padding:15px;
font-size:16px;
border-radius:12px;
border:none;
outline:none;
margin-top:20px;
}

button{
margin-top:25px;
padding:12px 35px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

</style>
</head>

<body>

<div class="box">

<h2>🎮 تحدي الأرشيف</h2>

<p>ما الكلمة التي تصف جيلك؟</p>

<input id="answer" placeholder="اكتب إجابتك هنا">

<br>

<button id="finishBtn">إنهاء</button>

</div>

<script type="module">

import { initializeApp } from "firebase/app";
import { getFirestore, collection, addDoc } from "firebase/firestore";

const firebaseConfig = {
apiKey: "AIzaSyCsFx_VBi6SSUfhXM2ozXefYN_-XLtc-Dw",
authDomain: "archive-next-generation.firebaseapp.com",
projectId: "archive-next-generation",
storageBucket: "archive-next-generation.firebasestorage.app",
messagingSenderId: "866271856728",
appId: "1:866271856728:web:c80ce1e5675bc77104222c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("finishBtn").addEventListener("click", async function(){

let gameAnswer=document.getElementById("answer").value;

if(gameAnswer===""){
alert("اكتب إجابتك أولًا 🤍");
return;
}

try{

await addDoc(collection(db,"archive_participants"),{
gameAnswer:gameAnswer,
time:new Date().toISOString()
});

}catch(e){
console.log(e);
}

window.location.href="thanks.html";

});

</script>

</body>
</html>

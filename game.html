<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رحلة الأرشيف</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0d5c3b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:25px;
width:500px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#22c55e;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#progress{
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="box">

<h2>🎮 رحلة الأرشيف</h2>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* Firebase إعداد */

const firebaseConfig = {
apiKey:"AIzaSyDIbGhX_VBiSSUfhXM2oxXefYN_-XLtc-Dw",
authDomain:"archive-next-generation.firebaseapp.com",
projectId:"archive-next-gen",
storageBucket:"archive-next-gen.firebasestorage.firebasestorage.app",
messagingSenderId:"866271856728",
appId:"1:866271856728:web:c80ce1e5675bc77104222d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* المستخدم */

let userID = localStorage.getItem("userID");
if(!userID){
userID = Date.now().toString();
localStorage.setItem("userID",userID);
}

/* الأسئلة */

let questions=[
{q:"كيف تحب أن تكون الثقافة في المستقبل؟",options:["رقمية","تراثية","متوازنة"]},
{q:"ما دور الشباب في الثقافة؟",options:["الابتكار","الحفاظ على التراث","نشر المعرفة"]},
{q:"ما أهم شيء للجيل القادم؟",options:["التعليم","الهوية الثقافية","التقنية"]},
{q:"اختر كلمة تصف جيلك",options:["طموح","مبدع","متجدد"]}
];

let index=0;

/* النقاط */

let scoreInnovation=0;
let scoreHeritage=0;
let scoreTech=0;

/* حفظ الإجابة */

function saveAnswer(answer){

if(answer==="الابتكار" || answer==="طموح" || answer==="مبدع") scoreInnovation++;
if(answer==="تراثية" || answer==="الحفاظ على التراث") scoreHeritage++;
if(answer==="رقمية") scoreTech++;

db.collection("archive_participants")
.doc(userID)
.set({
answers:firebase.firestore.FieldValue.arrayUnion({
question:questions[index].q,
answer:answer
}),
scores:{
innovation:scoreInnovation,
heritage:scoreHeritage,
tech:scoreTech
},
time:new Date().toISOString()
},{merge:true});

}

/* التحليل الذكي */

function analyzePerson(){

let description="";

if(scoreInnovation>=2 && scoreHeritage>=2){
description="أنت شخصية مبتكرة تهتم بالتراث وتجمع بين الإبداع والهوية الثقافية.";
}
else if(scoreInnovation>=2 && scoreTech>=2){
description="أنت شخصية مبتكرة رقمية تفكر بالمستقبل وتحب التقنية.";
}
else if(scoreHeritage>=2 && scoreTech>=2){
description="أنت شخص متوازن بين التراث والتقنية.";
}
else if(scoreInnovation>=2){
description="أنت شخصية مبتكرة تميل للأفكار الجديدة.";
}
else if(scoreHeritage>=2){
description="أنت شخصية تهتم بالتراث.";
}
else if(scoreTech>=2){
description="أنت شخصية رقمية.";
}
else{
description="أنت شخصية متوازنة بين الإبداع والتراث والتقنية.";
}

localStorage.setItem("archive_description",description);

}

/* النتيجة داخل اللعبة */

function showResult(){

analyzePerson();

let description = localStorage.getItem("archive_description");

document.getElementById("progress").innerText="🎉 انتهت الرحلة!";

document.getElementById("question").innerHTML=
"<h3>تحليل شخصيتك</h3><p>"+description+"</p>";

document.getElementById("options").innerHTML=
"<button onclick=\"goThanks()\">الانتقال إلى صفحة الشكر</button>";

}

/* عرض الأسئلة */

function showQuestion(){

if(index>=questions.length){
showResult();
return;
}

document.getElementById("progress").innerText=
`السؤال ${index+1} / ${questions.length}`;

document.getElementById("question").innerText=questions[index].q;

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

questions[index].options.forEach(opt=>{
let btn=document.createElement("button");
btn.innerText=opt;

btn.onclick=function(){
saveAnswer(opt);
index++;
showQuestion();
};

optionsDiv.appendChild(btn);
});

}

/* الانتقال للشكر */

function goThanks(){
window.location.href="thanks.html";
}

/* تشغيل */

window.addEventListener("DOMContentLoaded",showQuestion);

</script>

</body>
</html>

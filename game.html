<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رحلة الأرشيف</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b,#0d5c3b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:white;
}
.box{
  background:rgba(0,0,0,0.4);
  padding:40px;
  border-radius:25px;
  width:450px;
  text-align:center;
}
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  background:#22c55e;
  color:white;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}
#progress{
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="box">
<h2>🎮 رحلة الأرشيف</h2>
<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCsFx_VBi6SSUfhXM2ozXefYN_-XLtc-Dw",
  authDomain: "archive-next-generation.firebaseapp.com",
  projectId: "archive-next-generation",
  storageBucket: "archive-next-generation.firebasestorage.app",
  messagingSenderId: "866271856728",
  appId: "1:866271856728:web:02a6bc4cef2c14e415ea75"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// معرف المستخدم الفريد
let userID = localStorage.getItem("userID");
if(!userID){
  userID = Date.now().toString();
  localStorage.setItem("userID", userID);
}

// الأسئلة
let questions=[
  {q:"كيف تحب أن تكون الثقافة في المستقبل؟", options:["رقمية","تراثية","متوازنة"]},
  {q:"ما دور الشباب في الثقافة؟", options:["الابتكار","الحفاظ على التراث","نشر المعرفة"]},
  {q:"ما أهم شيء للجيل القادم؟", options:["التعليم","الهوية الثقافية","التقنية"]},
  {q:"اختر كلمة تصف جيلك", options:["طموح","مبدع","متجدد"]}
];

let index=0;

// نقاط لكل نوع إجابة
let scoreInnovation=0;
let scoreHeritage=0;
let scoreTech=0;

// حفظ الإجابة وحساب النقاط
function saveAnswer(answer){
  // حساب النقاط
  if(answer==="الابتكار" || answer==="طموح" || answer==="مبدع") scoreInnovation++;
  if(answer==="تراثية" || answer==="الحفاظ على التراث") scoreHeritage++;
  if(answer==="رقمية") scoreTech++;

  // حفظ الإجابة في Firebase
  db.collection("archive_participants").doc(userID).set({
    answers: firebase.firestore.FieldValue.arrayUnion({
      question: questions[index].q,
      answer: answer,
      time: new Date().toISOString()
    }),
    scores:{
      innovation: scoreInnovation,
      heritage: scoreHeritage,
      tech: scoreTech
    }
  }, { merge: true });
}

// وصف الشخص بناء على النقاط
function getDescription(){
  if(scoreInnovation >= scoreHeritage && scoreInnovation >= scoreTech){
    return "أنت مبدع ومبتكر، دائمًا تبحث عن طرق جديدة للتعبير عن الثقافة.";
  }
  if(scoreHeritage >= scoreInnovation && scoreHeritage >= scoreTech){
    return "أنت محافظ على التراث، تهتم بالحفاظ على هوية الجيل والموروث الثقافي.";
  }
  if(scoreTech >= scoreInnovation && scoreTech >= scoreHeritage){
    return "أنت رقمي ومهتم بالتقنيات الحديثة، تواكب المستقبل بخطوات سريعة.";
  }
  return "أنت متوازن بين الابتكار والتراث والتقنية، تعرف كيف تدمج الماضي والحاضر والمستقبل.";
}

// عرض الأسئلة
function showQuestion(){
  if(index>=questions.length){
    // عرض وصف الشخصية قبل الانتقال
    let description = getDescription();
    document.body.innerHTML = `
      <div class="box">
        <h2>🎉 انتهت الرحلة!</h2>
        <p>${description}</p>
        <button onclick="goToThanks()">التالي</button>
      </div>
    `;
    return;
  }

  document.getElementById("progress").innerText = `السؤال ${index+1} / ${questions.length}`;
  document.getElementById("question").innerText = questions[index].q;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  questions[index].options.forEach(opt=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = function(){
      saveAnswer(opt);
      index++;
      showQuestion();
    };
    optionsDiv.appendChild(btn);
  });
}

function goToThanks(){
  window.location.href = "thanks.html";
}

window.onload = showQuestion;
</script>

</body>
</html>

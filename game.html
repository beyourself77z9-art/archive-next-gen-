<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رحلة الأرشيف</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#0d5c3b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.game-box{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:25px;
width:450px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#22c55e;
color:white;
}

#progress{
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="game-box">

<h2>🎮 رحلة الأرشيف</h2>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

</div>

<script type="module">

import { initializeApp } from "firebase/app";
import { getFirestore, collection, addDoc } from "firebase/firestore";

const firebaseConfig = {
apiKey: "AIzaSyCsFx_VBi6SSUfhXM2ozXefYN_-XLtc-Dw",
authDomain: "archive-next-generation.firebaseapp.com",
projectId: "archive-next-generation",
storageBucket: "archive-next-generation.firebasestorage.app",
messagingSenderId: "866271856728",
appId: "1:866271856728:web:c80ce1e5675bc77104222d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions=[
{
q:"كيف تحب أن تكون الثقافة في المستقبل؟",
options:["رقمية","تراثية","متوازنة"]
},
{
q:"ما دور الشباب في الثقافة؟",
options:["الابتكار","الحفاظ على التراث","نشر المعرفة"]
},
{
q:"ما أهم شيء للجيل القادم؟",
options:["التعليم","الهوية الثقافية","التقنية"]
},
{
q:"اختر كلمة تصف جيلك",
options:["طموح","مبدع","متجدد"]
}
];

let index=0;

function showQuestion(){

if(index>=questions.length){
window.location.href="thanks.html";
return;
}

document.getElementById("progress")
.innerText=`السؤال ${index+1} / 4`;

document.getElementById("question")
.innerText=questions[index].q;

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

questions[index].options.forEach(opt=>{

let btn=document.createElement("button");
btn.innerText=opt;

btn.onclick=async function(){

await addDoc(collection(db,"archive_participants"),{
question:questions[index].q,
answer:opt,
time:new Date().toISOString()
});

index++;
showQuestion();

};

optionsDiv.appendChild(btn);

});

}

showQuestion();

</script>

</body>
</html>

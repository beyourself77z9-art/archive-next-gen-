<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة الأرشيف</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
max-width:500px;
margin:auto;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>🎮 تحدي الأرشيف</h2>

<p id="question">اضغط لبدء اللعبة</p>

<button onclick="startGame()">ابدأ</button>

</div>

<script>

let questions=[
"ما الكلمة التي تصف جيلك؟",
"لو كتبت رسالة للمستقبل ماذا تقول؟",
"ما الشيء الذي يجب ألا يختفي من ثقافتنا؟"
];

function startGame(){

let random=Math.floor(Math.random()*questions.length);

document.getElementById("question").innerText=questions[random];

}

</script>

</body>
</html>

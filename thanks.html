<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>أرشيف الجيل القادم</title>

<meta name="title" content="أرشيف الجيل القادم">
<meta name="description" content="شكرًا لمشاركتك في أرشيف الجيل القادم وتوثيق أفكار الجيل القادم حول مستقبل الثقافة في السعودية">
<meta name="keywords" content="أرشيف الجيل القادم, الثقافة, الجيل القادم, السعودية">
<meta name="author" content="Archive Next Generation">
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}

.box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
max-width:600px;
backdrop-filter:blur(10px);
}

h1{
color:#38bdf8;
margin-bottom:20px;
}

p{
line-height:1.8;
font-size:18px;
}

.buttons{
margin-top:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.share{
background:#22c55e;
color:white;
}

.home{
background:#3b82f6;
color:white;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="box">

<h1>🎉 انتهت الرحلة!</h1>

<p>
شكراً لمشاركتك في أرشيف الجيل القادم <br>
إجاباتك ليست مجرد كلمات، بل جزء من صوت جيل كامل يصنع ثقافته ويترك أثره للمستقبل <br><br>

بمشاركتك اليوم، أصبحت فكرة منك جزءاً من هذا الأرشيف <br><br>

شكراً لوقتك… ولأنك واحد من صُنّاع الغد ✨
</p>

<div class="buttons">

<button class="share" onclick="sharePage()">📤 مشاركة</button>
<button class="home" onclick="goHome()">🔁 العودة للبداية</button>

</div>

</div>

<script>

// مشاركة الموقع
function sharePage(){

if(navigator.share){

navigator.share({
title:"أرشيف الجيل القادم",
text:"جرب تجربة أرشيف الجيل القادم!",
url:window.location.href
});

}else{

navigator.clipboard.writeText(window.location.href);
alert("تم نسخ رابط الموقع 👍");

}

}

// العودة للصفحة الرئيسية
function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
